<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K&C 30TH ANNIVERSARY · Lucky Draw (Lite)</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ─────────────────────────────────────── */
:root {
  --g1: #fdf1a9;   
  --g2: #d4a345;   
  --g3: #966922;   
  --g4: #52350a;   
  --glow: rgba(212, 163, 69, 0.65);
  
  --bg:  #1c1611; 
  --bg2: #2e241c; 
  --ink: #f4e8c1;
  --ink2: rgba(244, 232, 193, 0.55);
}

.slot.blackout{
  background:#000 !important;
  border-color:#000 !important;
  box-shadow:none !important;
  transition:all .25s ease;
}
.slot.blackout .slot-num{
  opacity:0;
}

/* ─── RESET ──────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100vh;overflow-x:hidden}

body {
  background: var(--bg);
  font-family: 'Cormorant Garamond', serif;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ─── CANVAS (particles) ─────────────────────────── */
#cvs {
  position:fixed;inset:0;
  pointer-events:none;z-index:0;
}

/* ─── LAYERED BG (LITE VERSION) ──────────────────── */
.bg {
  position:fixed;inset:0;z-index:0;overflow:hidden;
}

/* OPTIMIZED: Removed heavy filter:blur(60px) for instant loading */
.silk {
  position:absolute;
  border-radius:50%;
  will-change: transform; 
}
.silk-a{
  width:160vw;height:90vh;
  top:-25vh;left:-30vw;
  background:radial-gradient(ellipse at 45% 55%,rgba(228, 203, 163, 0.15),transparent 60%);
  animation:sway 20s ease-in-out infinite alternate;
}
.silk-b{
  width:140vw;height:80vh;
  top:-10vh;right:-30vw;
  background:radial-gradient(ellipse at 60% 45%,rgba(247, 231, 206, 0.12),transparent 55%);
  animation:sway 26s ease-in-out infinite alternate-reverse;
}
.silk-c{
  width:90vw;height:70vh;
  bottom:0;left:5vw;
  background:radial-gradient(ellipse at 50% 80%,rgba(212, 185, 144, 0.15),transparent 60%);
}
@keyframes sway{
  from{transform:rotate(-6deg) translateY(0) translateZ(0)}
  to  {transform:rotate(-3deg) translateY(18px) translateZ(0)}
}

.streak{
  position:absolute;
  bottom:32vh;left:-5%;width:110%;height:1px;
  background:linear-gradient(90deg,transparent 0%,var(--g3) 28%,var(--g1) 50%,var(--g3) 72%,transparent 100%);
  box-shadow:0 0 40px 10px rgba(212, 163, 69, 0.25),0 0 100px 30px rgba(212, 163, 69, 0.08);
  transform:rotate(-1.2deg);
  animation:streakPulse 5s ease-in-out infinite alternate;
}
@keyframes streakPulse{from{opacity:.4}to{opacity:1}}

/* ─── PAGE SHELL ─────────────────────────────────── */
.page{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  padding: clamp(20px, 5vh, 44px) 20px 70px;
  padding-right: 320px; 
}

@media (max-width: 1100px) {
  .page { padding-right: 20px; }
}

/* ─── HEADER ─────────────────────────────────────── */
.hdr{
  text-align:center;
  animation:rise 1.4s cubic-bezier(.16,1,.3,1) both;
}
@keyframes rise{from{opacity:0;transform:translateY(-28px)}to{opacity:1;transform:none}}

.ornline{
  display:flex;align-items:center;justify-content:center;
  gap:10px;width:480px;max-width:92vw;margin:0 auto;
}
.ornline .ln{
  flex:1;height:1px;
  background:linear-gradient(90deg,transparent,var(--g2),transparent);
  opacity:.7;
}
.diam{
  width:7px;height:7px;
  background:var(--g1);
  transform:rotate(45deg);
  box-shadow:0 0 12px var(--glow);
  flex-shrink:0;
}
.diam-s{
  width:4px;height:4px;
  background:var(--g2);
  transform:rotate(45deg);
  flex-shrink:0;
}
.kc{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(2.6rem,7vw,4.6rem);
  font-weight:700;
  letter-spacing:.22em;
  background:linear-gradient(155deg,#7a5113 0%,#d4a345 20%,#fdf1a9 45%,#d4a345 70%,#7a5113 100%);
  -webkit-background-clip:text;background-clip:text;
  color:transparent;
  filter:drop-shadow(0 0 25px rgba(212, 163, 69, .4));
  line-height:1.05;
  margin-top:14px;
}
.ann{
  font-family:'Cinzel',serif;
  font-size:clamp(.65rem,1.6vw,.9rem);
  letter-spacing:.6em;
  color:var(--g1);
  margin-top:5px;
  opacity:.9;
}
.sub{
  font-family:'Cinzel',serif;
  font-size:clamp(.95rem,2.4vw,1.3rem);
  letter-spacing:.38em;
  color:var(--ink2);
  margin-top:12px;
  font-weight:400;
}

/* ─── DISPLAY PANEL ──────────────────────────────── */
.panel-wrap{
  margin-top: clamp(20px, 4vh, 34px);
  width:100%;max-width:860px;
  animation:rise 1.6s .3s cubic-bezier(.16,1,.3,1) both;
}

.outer-frame{
  padding: 3px;
  background:linear-gradient(130deg,#4a330a,#d4a345,#fdf1a9,#d4a345,#4a330a);
  border-radius:4px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 30px rgba(212, 163, 69, 0.15);
}
.inner-frame{
  background:linear-gradient(150deg,#0e0c14 0%,#15120d 50%,#0a080f 100%);
  border-radius:2px;
  padding: clamp(24px, 4vw, 36px) clamp(20px, 4vw, 36px) clamp(20px, 3vw, 28px);
  position:relative;
  overflow:visible; 
  transition: background 0.5s ease;
}
.inner-frame::before{
  content:'';position:absolute;inset:0;
  border-radius:2px; overflow:hidden;
  background:
    radial-gradient(ellipse at 50% 0%,rgba(212, 163, 69,.08) 0%,transparent 55%),
    radial-gradient(ellipse at 50% 100%,rgba(212, 163, 69,.04) 0%,transparent 45%);
  pointer-events:none;
}

/* ─── CLOCK OVERLAY (Suspense Mode) ─────────────── */
.clock-overlay {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 150%; 
  padding-bottom: 150%;
  border-radius: 50%;
  background: conic-gradient(from 0deg, transparent 70%, rgba(212, 163, 69, 0.3) 100%);
  opacity: 0;
  pointer-events: none;
  z-index: 1;
  mix-blend-mode: screen;
  transition: opacity 0.5s ease;
}

.inner-frame.suspense-mode {
  background: #020104; 
}
.inner-frame.suspense-mode .clock-overlay {
  opacity: 1;
  animation: clockSweep 1s steps(60) infinite;
}
.inner-frame.suspense-mode .slot.locked {
  filter: brightness(0.4) saturate(0.5); 
  transform: scale(0.95);
  transition: all 0.5s;
}

@keyframes clockSweep {
  0% { transform: translate(-50%, -50%) rotate(0deg); }
  100% { transform: translate(-50%, -50%) rotate(360deg); }
}

.c{position:absolute;width:24px;height:24px; z-index: 5;}
.c::before,.c::after{content:'';position:absolute;background:var(--g2);opacity:.85}
.c::before{top:0;left:0;width:100%;height:1px}
.c::after {top:0;left:0;width:1px;height:100%}
.c.tl{top:10px;left:10px}
.c.tr{top:10px;right:10px;transform:scaleX(-1)}
.c.bl{bottom:10px;left:10px;transform:scaleY(-1)}
.c.br{bottom:10px;right:10px;transform:scale(-1)}

/* ─── SLOTS ROW ──────────────────────────────────── */
.slots{
  display:flex;
  justify-content:center;
  gap:clamp(8px,1.5vw,16px);
  position: relative;
  z-index: 5;
}

.slot{
  width:clamp(65px, 13vw, 115px);
  height:clamp(85px, 16vw, 140px);
  background: #08060a;
  border:1px solid rgba(212, 163, 69, .25);
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  box-shadow:inset 0 4px 20px rgba(0,0,0,1);
  transition:border-color .3s,box-shadow .3s, transform 0.4s, filter 0.4s;
}

.slot::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 4px;
  background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 25%, rgba(0,0,0,0) 75%, rgba(0,0,0,0.85) 100%);
  z-index: 2;
  pointer-events: none;
}
.slot.rolling{
  border-color:rgba(212, 163, 69,.65);
  box-shadow:inset 0 4px 20px rgba(0,0,0,1), 0 0 20px rgba(212, 163, 69,.2);
}
.slot.rolling::after{
  content:'';
  position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(253, 241, 169,.65),transparent);
  animation:scan .35s linear infinite;
  pointer-events:none;
  z-index: 3;
}
@keyframes scan{0%{top:0%}100%{top:100%}}

.slot.locked{
  border-color:var(--g2);
  box-shadow:
    inset 0 4px 20px rgba(0,0,0,1),
    0 0 35px rgba(212, 163, 69,.45),
    0 0 80px rgba(212, 163, 69,.15);
  animation:lockPop .5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
}
@keyframes lockPop{
  0% {transform:scale(1.08);box-shadow:0 0 65px rgba(253, 241, 169,.75)}
  100%{transform:scale(1)}
}

/* ─── INSTANT SSR REVEAL ANIMATION ─── */
.slot.ssr-reveal {
  animation: ssrExplode 1.8s cubic-bezier(0.2, 0.9, 0.3, 1.1) forwards;
  z-index: 50; 
}
@keyframes ssrExplode {
  0% { transform: scale(1); border-color: #fff; }
  15% { transform: translateY(-15px) scale(1.6); box-shadow: 0 0 100px var(--g1), inset 0 0 40px var(--g1); background: linear-gradient(135deg, #3a2a08, #1a1304); border-color: #fff; }
  75% { transform: translateY(-15px) scale(1.6); box-shadow: 0 0 60px var(--g1), 0 10px 30px rgba(0,0,0,0.8); background: linear-gradient(135deg, #3a2a08, #1a1304); border-color: var(--g1); }
  100% { transform: scale(1); box-shadow: inset 0 4px 20px rgba(0,0,0,1), 0 0 35px rgba(212, 163, 69,.45); border-color: var(--g2); background: #08060a; }
}

.slot-num{
  font-family:'Cinzel',serif;
  font-variant-numeric: tabular-nums; 
  font-size:clamp(2.4rem, 5.5vw, 4rem);
  font-weight:700;
  color:var(--g1);
  text-shadow:0 0 25px var(--glow),0 3px 6px rgba(0,0,0,1);
  letter-spacing:0;
  line-height:1;
  z-index:1;
  user-select:none;
  transition:color .12s;
}
.slot.rolling .slot-num{
  color:#fff;
  text-shadow:0 0 20px rgba(255, 250, 200, .9);
  animation:flicker .08s infinite;
}
@keyframes flicker{0%,100%{opacity:1}50%{opacity:.75}}
.slot.locked .slot-num, .slot.ssr-reveal .slot-num{
  color:var(--g1);
  text-shadow:0 0 32px rgba(253, 241, 169, 1), 0 0 70px rgba(212, 163, 69, .55);
  animation:goldGlow 2s ease-in-out infinite;
}
@keyframes goldGlow{
  0%,100%{text-shadow:0 0 32px rgba(253, 241, 169, .95),0 0 70px rgba(212, 163, 69, .5)}
  50%    {text-shadow:0 0 55px rgba(253, 241, 169, 1),  0 0 100px rgba(212, 163, 69, .75)}
}

.refline{
  position:absolute;left:0;right:0;top:50%;
  height:1px;
  background:linear-gradient(90deg,transparent 5%,rgba(212, 163, 69,.2) 35%,rgba(253, 241, 169,.35) 50%,rgba(212, 163, 69,.2) 65%,transparent 95%);
  pointer-events:none;
  z-index: 6;
}

.pcaption{
  text-align:center;
  margin-top: 20px;
  position: relative;
  z-index: 5;
  font-family:'Cinzel',serif;
  font-size:clamp(.65rem, 1.2vw, .75rem);
  letter-spacing:.35em;
  color:var(--ink2);
}
.pcaption em{color:var(--g2);font-style:normal;font-weight:600;}

/* ─── STATUS ─────────────────────────────────────── */
.status-row{
  margin-top:24px;
  display:flex;align-items:center;justify-content:center;gap:12px;
  height:24px;
}
.dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--g4);
  transition:background .3s,box-shadow .3s;
  flex-shrink:0;
}
.dot.on{
  background:var(--g1);
  box-shadow:0 0 14px var(--glow);
  animation:blink .9s ease infinite alternate;
}
.dot.danger {
  background: #ff4a4a;
  box-shadow: 0 0 20px #ff4a4a;
  animation: rapidBlink 0.3s ease infinite alternate;
}
@keyframes rapidBlink { from { opacity: 1; transform: scale(1.2); } to { opacity: 0.5; transform: scale(1); } }
@keyframes blink{from{opacity:1}to{opacity:.3}}
 .stxt{
  font-family:'Cinzel',serif;
  font-size:.75rem;letter-spacing:.35em;
  color:var(--ink2);text-transform:uppercase;
  transition:color .4s;
}
.stxt.go {color:var(--g2)}
.stxt.danger {color: #ffaaaa; text-shadow: 0 0 10px rgba(255, 50, 50, 0.5); font-weight: 600;}
.stxt.win{color:var(--g1);text-shadow:0 0 15px var(--glow); font-weight: 600;}

/* ─── TIMER BAR ──────────────────────────────────── */
.timer-wrap{
  margin: 16px auto 0; /* FIX: Centers the progress bar inside its parent container */
  width:100%;max-width:520px;
  display:none;
  flex-direction:column;gap:6px;
  align-items:center;
}
.timer-track{
  width:100%;height:4px;
  background:rgba(212, 163, 69,.15);
  border-radius:3px;overflow:hidden;
}
.timer-fill{
  height:100%;width:100%;
  background:linear-gradient(90deg,var(--g3),var(--g1));
  border-radius:3px;
  box-shadow:0 0 10px var(--glow);
  transition:width .08s linear;
}
.timer-label{
  font-family:'Cinzel',serif;
  font-size:.6rem;letter-spacing:.35em;
  color:var(--ink2);text-transform:uppercase;
}

/* ─── SPACER ───────────────────────────────── */
.spacer{
  height: clamp(40px, 8vh, 100px);
}

/* ─── BUTTONS ────────────────────────────────────── */
.btns{
  display:flex;gap:20px;align-items:center;
  animation:rise 1.6s .6s cubic-bezier(.16,1,.3,1) both;
}

.btn{
  font-family:'Cinzel',serif;
  font-size:.85rem;letter-spacing:.45em;
  font-weight: 600;
  text-transform:uppercase;
  padding:16px 54px;
  border:none;cursor:pointer;
  position:relative;outline:none;
  transition:all .2s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.3s ease;
  clip-path:polygon(16px 0%,calc(100% - 16px) 0%,100% 50%,calc(100% - 16px) 100%,16px 100%,0% 50%);
}

.btn-start{
  background:linear-gradient(135deg,#7a5113 0%,#d4a345 30%,#fdf1a9 55%,#d4a345 78%,#63410c 100%);
  color:#0a0700;
  box-shadow:0 0 35px rgba(212, 163, 69,.3),0 6px 20px rgba(0,0,0,.7);
}
.btn-start::after{
  content:'';position:absolute;inset:2px;
  clip-path:polygon(16px 0%,calc(100% - 16px) 0%,100% 50%,calc(100% - 16px) 100%,16px 100%,0% 50%);
  background:linear-gradient(135deg,#d4a345,#fdf1a9,#d4a345);
  opacity:0;transition:opacity .25s ease;
}
.btn-start span {
  position: relative;
  z-index: 2;
}
.btn-start:hover:not(:disabled)::after{opacity:1}
.btn-start:hover:not(:disabled){
  transform:translateY(-3px) scale(1.02);
  box-shadow:0 0 60px rgba(253, 241, 169,.55),0 10px 30px rgba(0,0,0,.8);
}
.btn-start:active:not(:disabled){
  transform:translateY(1px) scale(0.98);
  box-shadow:0 0 20px rgba(253, 241, 169,.4),0 4px 10px rgba(0,0,0,.6);
}
.btn-start:disabled{
  background:linear-gradient(135deg,#241a0a,#36260f);
  color:#4a3315;cursor:not-allowed;box-shadow:none;
}
.btn-start:disabled::after{ display: none; }

.btn-hidden {
  opacity: 0 !important;
  pointer-events: none !important;
  transform: translateY(10px);
}

/* REVEAL / SKIP BUTTON STATE */
.btn-reveal {
  background: linear-gradient(135deg, #8a1717 0%, #e04848 30%, #ffc0c0 55%, #e04848 78%, #6b0c0c 100%);
  color: #fff;
  box-shadow: 0 0 45px rgba(224, 72, 72, 0.5), 0 6px 20px rgba(0,0,0,0.8);
}
.btn-reveal::after {
  background: linear-gradient(135deg, #e04848, #ffc0c0, #e04848);
}

/* ─── HISTORY ─── */
.hist-wrap {
  position: fixed;
  top: 50%;
  right: 2vw;
  transform: translateY(-50%);
  width: 290px;
  max-height: 85vh;
  overflow-y: auto;
  margin-top: 0;
  animation: rise 1.8s .9s both;
  background: rgba(10, 8, 15, 0.45);
  padding: 24px 20px;
  border-radius: 8px;
  border: 1px solid rgba(212, 163, 69, 0.15);
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
}
.hist-wrap::-webkit-scrollbar { width: 4px; }
.hist-wrap::-webkit-scrollbar-track { background: transparent; }
.hist-wrap::-webkit-scrollbar-thumb { background: rgba(212, 163, 69, 0.4); border-radius: 4px; }
 .hist-head{
  display:flex;align-items:center;gap:16px;margin-bottom:20px;
}
.hist-head .hl{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(212, 163, 69,.35),transparent)}
.hist-head .hlbl{
  font-family:'Cinzel',serif;font-size:.65rem;
  letter-spacing:.45em;color:var(--ink2);
  text-transform:uppercase;white-space:nowrap;
}
.hist-grid{
  display:flex;flex-direction:column;gap:10px;align-items:stretch;
}
.badge{
  font-family:'Cinzel',serif;font-size:.85rem;
  color:var(--g1);
  background:rgba(212, 163, 69,.08);
  border:1px solid rgba(212, 163, 69,.25);
  padding:10px 20px;letter-spacing:.15em;
  position:relative;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  animation:badgeIn .5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  transition: all 0.3s;
  text-align: center;
}
.badge .pz {
  font-size: 0.75em;
  color: var(--ink2);
  margin-right: 12px;
  letter-spacing: 0.1em;
}
.badge:hover {
  background:rgba(212, 163, 69,.15);
  transform: translateY(-2px);
  box-shadow: 0 6px 15px rgba(0,0,0,0.6), 0 0 15px rgba(212, 163, 69, 0.2);
}
@keyframes badgeIn{from{opacity:0;transform:scale(.8) translateY(12px)}to{opacity:1;transform:none}}
.badge::before,.badge::after{
  content:'';position:absolute;top:50%;
  width:4px;height:4px;background:var(--g1);
  transform:translateY(-50%) rotate(45deg);opacity:.7;
}
.badge::before{left:8px}.badge::after{right:8px}
.no-hist{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.25em;color:rgba(244, 232, 193,.2);text-transform:uppercase; text-align: center;}

@media (max-width: 1100px) {
  .hist-wrap {
    position: relative;
    top: auto; right: auto; transform: none;
    width: 100%; max-width: 860px;
    margin-top: clamp(36px, 6vh, 52px);
    background: transparent; border: none; box-shadow: none; backdrop-filter: none;
    padding: 0;
  }
  .hist-grid { flex-direction: row; flex-wrap: wrap; justify-content: center; }
}

.footer{
  margin-top: auto;
  padding-top: 56px;
  text-align:center;
  opacity:.35;
  transition: opacity 0.3s;
}
.footer:hover { opacity: 0.7; }
.footer .fm{font-family:'Cinzel Decorative',serif;font-size:.95rem;letter-spacing:.5em;color:var(--g2)}
.footer .fy{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.55em;color:var(--g3);margin-top:6px;text-transform:uppercase}

/* ─── WINNER REVEAL OVERLAY ─────────────── */
.winner-banner{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;transition:opacity .4s;
}
.winner-banner.show{opacity:1;pointer-events:auto;}
.wb-backdrop{position:absolute;inset:0;background:rgba(5,4,10,.92);}
.wb-box{
  position:relative;z-index:1;
  text-align:center;
  animation:popIn .6s cubic-bezier(.16,1,.3,1);
}
@keyframes popIn{from{opacity:0;transform:scale(.88) translateY(20px)}to{opacity:1;transform:none}}
.wb-label{
  font-family:'Cinzel',serif;font-size:clamp(.8rem,2vw,1.2rem);
  letter-spacing:.55em;color:var(--g2);margin-bottom:8px;text-transform:uppercase;
}
.wb-prize {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  font-weight: 700;
  color: var(--g1);
  letter-spacing: 0.15em;
  margin-bottom: 12px;
  text-shadow: 0 0 20px var(--glow);
}
.wb-num{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(5rem, 20vw, 15rem);
  font-weight:700;letter-spacing:.12em;
  background:linear-gradient(155deg,#7a5113,#d4a345 20%,#fdf1a9 45%,#d4a345 75%,#7a5113);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 60px rgba(253,241,169,.6));
  line-height:1;text-shadow:none;
}
.wb-sub{
  font-family:'Cinzel',serif;font-size:clamp(.7rem,1.8vw,1rem);
  letter-spacing:.45em;color:var(--ink2);margin-top:10px;
}
.wb-dismiss{
  margin-top:40px;
  font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.4em;
  color:var(--g2);border:1px solid rgba(212, 163, 69,.35);
  background:transparent;cursor:pointer;padding:16px 42px;
  transition:all .2s;pointer-events:auto;
}
.wb-dismiss:hover{background:rgba(212, 163, 69,.15);border-color:var(--g1);color:var(--g1); transform: translateY(-2px);}
.wb-lines{
  display:flex;align-items:center;gap:12px;margin:18px 0 10px;
}
.wb-ln{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(212, 163, 69,.4),transparent);}
.wb-diamond{
  width:8px;height:8px;background:var(--g1);transform:rotate(45deg);
  box-shadow:0 0 12px var(--glow);
}
</style>
</head>
<body>

<canvas id="cvs"></canvas>

<div class="bg">
  <div class="silk silk-a"></div>
  <div class="silk silk-b"></div>
  <div class="silk silk-c"></div>
  <div class="streak"></div>
</div>

<div class="winner-banner" id="winnerBanner">
  <div class="wb-backdrop" onclick="dismissWinner()"></div>
  <div class="wb-box">
    <div class="wb-label">恭喜得獎 · Congratulations</div>
    <div class="wb-prize" id="wbPrize">第5獎</div>
    <div class="wb-lines">
      <div class="wb-ln"></div><div class="wb-diamond"></div><div class="wb-ln"></div>
    </div>
    <div class="wb-num" id="wbNum">—</div>
    <div class="wb-lines">
      <div class="wb-ln"></div><div class="wb-diamond"></div><div class="wb-ln"></div>
    </div>
    <div class="wb-sub">Lucky Draw Winner · 30th Anniversary</div>
    <button class="wb-dismiss" onclick="dismissWinner()">Continue &thinsp;· 繼續</button>
  </div>
</div>

<div class="page">

  <header class="hdr">
    <div class="ornline">
      <div class="ln"></div><div class="diam-s"></div><div class="diam"></div><div class="diam-s"></div><div class="ln"></div>
    </div>
    <div class="kc">K&amp;C</div>
    <div class="ann">30<sup style="font-size:.55em;vertical-align:super">TH</sup>&ensp;Anniversary</div>
    <div class="sub">Lucky Draw Ceremony</div>
    <div class="ornline" style="margin-top:18px">
      <div class="ln"></div><div class="diam-s"></div><div class="diam"></div><div class="diam-s"></div><div class="ln"></div>
    </div>
  </header>

  <div class="panel-wrap">
    <div class="outer-frame">
      <div class="inner-frame" id="innerFrame">
        
        <div class="clock-overlay"></div>

        <div class="c tl"></div><div class="c tr"></div>
        <div class="c bl"></div><div class="c br"></div>
 <div class="slots" id="slots">
          <div class="slot" id="s0"><div class="slot-num" id="n0">—</div></div>
          <div class="slot" id="s1"><div class="slot-num" id="n1">—</div></div>
          <div class="slot" id="s2"><div class="slot-num" id="n2">—</div></div>
          <div class="slot" id="s3"><div class="slot-num" id="n3">—</div></div>
          <div class="slot" id="s4"><div class="slot-num" id="n4">—</div></div>
        </div>
        <div class="refline"></div>

        <div class="pcaption">號碼範圍&ensp;<em>10001 — 10600</em>&ensp;·&ensp;Lucky Number Draw</div>
      </div>
    </div>

    <div class="status-row">
      <div class="dot" id="dot"></div>
      <div class="stxt" id="stxt">Awaiting · 等待抽獎</div>
    </div>

    <div class="timer-wrap" id="timerWrap">
      <div class="timer-track"><div class="timer-fill" id="timerFill"></div></div>
      <div class="timer-label" id="timerLabel">auto stop / skip</div>
    </div>
  </div>

  <div class="spacer"></div>

  <div class="btns">
    <button class="btn btn-start" id="btnStart" onclick="handleMainAction()"><span>▶️ &thinsp;開始抽獎 (第5獎)</span></button>
  </div>

  <div class="hist-wrap">
    <div class="hist-head">
      <div class="hl"></div>
      <div class="hlbl">Winners Log &middot; 得獎記錄</div>
      <div class="hl"></div>
    </div>
    <div class="hist-grid" id="histGrid">
      <span class="no-hist">尚無得獎記錄</span>
    </div>
  </div>

  <div class="footer">
    <div class="fm">K &amp; C</div>
    <div class="fy">Celebrating Three Decades of Excellence &nbsp;·&nbsp; 1994 – 2024</div>
  </div>

</div><script>
/* ── Particles (LITE VERSION) ──────────────────── */
(()=>{
  const cv=document.getElementById('cvs'),ctx=cv.getContext('2d');
  let W,H,pts=[];
  
  const resize=()=>{
    W = innerWidth; 
    H = innerHeight;
    const scale = 0.6; 
    cv.width = W * scale;
    cv.height = H * scale;
    cv.style.width = '100vw';
    cv.style.height = '100vh';
    ctx.setTransform(scale, 0, 0, scale, 0, 0);
  };
  
  addEventListener('resize',resize);resize();
  const cols=['rgba(212, 163, 69,','rgba(253, 241, 169,','rgba(150, 105, 34,'];
  const mk=()=>({x:Math.random()*W,y:H+4,r:Math.random()*1.8+.4,a:Math.random()*.5+.1,
    vx:(Math.random()-.5)*.15,vy:-(Math.random()*.35+.08),life:0,max:Math.random()*.7+.25});
  
  /* Reduced from 80 to 20 for lite performance */
  for(let i=0;i<20;i++){const p=mk();p.y=Math.random()*H;p.life=Math.random();pts.push(p)}
  
  let burstPts=[];
  window.spawnBurst=(cx,cy)=>{
    /* Reduced burst points to 30 */
    for(let i=0;i<30;i++){
      const ang=Math.random()*Math.PI*2,spd=Math.random()*8+1;
      burstPts.push({x:cx,y:cy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-.5,
        r:Math.random()*2+.5,a:.9,fade:.015+Math.random()*.02});
    }
  };

  (function tick(){
    ctx.clearRect(0,0,W,H);
    pts.forEach((p,i)=>{
      p.x+=p.vx;p.y+=p.vy;p.life+=.0025;
      const f=p.life<.1?p.life/.1:p.life>p.max?1-(p.life-p.max)/(1-p.max):1;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=cols[i%cols.length]+(p.a*f)+')';ctx.fill();
      if(p.life>=1||p.y<-6)pts[i]=mk();
    });

    burstPts=burstPts.filter(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=.15; 
      p.a-=p.fade;
      if(p.a<=0)return false;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(253, 241, 169,'+p.a+')';ctx.fill();
      return true;
    });

    requestAnimationFrame(tick);
  })();
})();

/* ── State ─────────────────────────────────────── */
const MIN=10001,MAX=10600;
let excluded=new Set();
let rolling=false;
let ivals=[null,null,null,null,null];
let result=null;
let stopIdx=0;
let barTmr=null;

let awaitingManualReveal = false;
let currentlyRevealing = false;

const PRIZES = ['第5獎', '第4獎', '第3獎', '第2獎', '大獎'];
let prizeIndex = 0;
const innerFrame = document.getElementById('innerFrame');
const slotEls = [0,1,2,3,4].map(i=>document.getElementById('s'+i));
const numEls  = [0,1,2,3,4].map(i=>document.getElementById('n'+i));
const btnStart  = document.getElementById('btnStart');
const btnStartText = btnStart.querySelector('span');
const dot       = document.getElementById('dot');
const stxt      = document.getElementById('stxt');
const timerWrap = document.getElementById('timerWrap');
const timerFill = document.getElementById('timerFill');
const timerLabel= document.getElementById('timerLabel');
const histGrid  = document.getElementById('histGrid');
const winnerBanner = document.getElementById('winnerBanner');
const wbNum = document.getElementById('wbNum');
const wbPrize = document.getElementById('wbPrize');

function pool(){
  const a=[];for(let n=MIN;n<=MAX;n++)if(!excluded.has(n))a.push(n);return a;
}
function pickRand(arr){return arr[Math.floor(Math.random()*arr.length)]}
function d5(n){return String(n).split('')}

function setStatus(msg,cls=''){
  stxt.textContent=msg;
  stxt.className='stxt'+(cls?' '+cls:'');
  dot.className='dot'+(cls==='go'||cls==='win'||cls==='danger'?' on':'');
  if(cls === 'danger') dot.className = 'dot danger';
}

/* ── MAIN ACTION HANDLER (Anti-Spam Lock) ──────── */
function handleMainAction() {
  if (currentlyRevealing) return; 

  if (awaitingManualReveal) {
    triggerManualReveal();
  } else if (rolling && !awaitingManualReveal) {
    // BUG FIX: Allow user to click to instantly skip the initial wait timer!
    clearTimeout(window.drawTimeout);
    clearInterval(barTmr);
    timerFill.style.width='0%';
    timerWrap.style.display='none';
    beginStop();
  } else if (!rolling) { 
    startDraw();
  }
}

/* ── START ─────────────────────────────────────── */
function startDraw(){
  if(rolling)return;
  
  if (prizeIndex >= PRIZES.length) {
    setStatus('所有獎項已抽完 · All Prizes Drawn', 'win');
    return;
  }

  const p=pool();
  if(!p.length){setStatus('號碼已全部抽完 · All Done');return}

  rolling=true;stopIdx=0;
  result=pickRand(p);
  
  // BUG FIX: Change button to SKIP mode during the initial roll instead of hiding it
  btnStart.disabled = false;
  btnStart.classList.add('btn-reveal');
  btnStartText.textContent = '⏭️ \u2009跳過動畫 (Skip)';
  
  innerFrame.classList.remove('suspense-mode');
  slotEls.forEach(sl => sl.classList.remove('ssr-moving', 'ssr-reveal', 'locked', 'rolling', 'blackout'));

  setStatus(`Rolling for ${PRIZES[prizeIndex]} · 滾動中`,'go');

  slotEls.forEach((sl,i)=>{
    sl.classList.add('slot', 'rolling');
    numEls[i].textContent=Math.floor(Math.random()*10);
    ivals[i]=setInterval(()=>{numEls[i].textContent=Math.floor(Math.random()*10)},52);
  });

  timerWrap.style.display='flex';
  requestAnimationFrame(() => { timerFill.style.width='100%'; });

  // LITE VERSION: Reduced from 5000ms to 2500ms default wait
  const TOTAL=2500,TICK=80;
  let elapsed=0;
  clearInterval(barTmr);
  barTmr=setInterval(()=>{
    elapsed+=TICK;
    const pct=Math.max(0,100-(elapsed/TOTAL*100));
    timerFill.style.width=pct+'%';
    const s=Math.max(0,Math.ceil((TOTAL-elapsed)/1000));
    timerLabel.textContent=s+'s · skip / auto stop';
    if(elapsed>=TOTAL){
      clearInterval(barTmr);
      timerFill.style.width='0%';
    }
  },TICK);

  window.drawTimeout = setTimeout(beginStop, TOTAL);
}

/* ── STOP SEQUENCE ─────────────────────────────── */
function beginStop(){
  clearTimeout(window.drawTimeout);
  timerWrap.style.display='none';
  setStatus('Locking In · 逐一停止','go');
  stopNext();
}

function stopNext(){
  if(stopIdx>=5){finalise();return}
  const i=stopIdx;
  
  let requiresManual = (i >= 2);

  if (requiresManual) {
    for (let j = i; j < 5; j++) {
        clearInterval(ivals[j]);
        slotEls[j].classList.remove('rolling', 'ssr-moving');
        slotEls[j].classList.add('blackout');
        numEls[j].textContent = '';
    }

    if (!currentlyRevealing) {
        awaitingManualReveal = true;
        setStatus('Awaiting Manual Reveal · 請點擊按鈕揭曉', 'danger');
        
        btnStart.classList.remove('btn-hidden');
        btnStart.disabled = false;
        btnStart.classList.add('btn-reveal');
        btnStartText.textContent = '▶️ \u2009手動揭曉 (Reveal)';
        
        innerFrame.classList.add('suspense-mode');
        return; 
    }
  }

  currentlyRevealing = false;
  executeStopAnimation(i);
}

function triggerManualReveal() {
  if (!awaitingManualReveal || currentlyRevealing) return;
  
  currentlyRevealing = true; 
  awaitingManualReveal = false;
  
  btnStart.classList.add('btn-hidden');
  btnStart.classList.remove('btn-reveal');
  btnStart.disabled = true; 
  
  innerFrame.classList.remove('suspense-mode');
  
  const i = stopIdx;
  const digits = d5(result);

  slotEls[i].classList.remove('blackout');

  if (i === 4) {
    slotEls[i].classList.add('ssr-reveal');
    numEls[i].textContent = digits[i];
    stopIdx++;
    setTimeout(() => {
      currentlyRevealing = false;
      stopNext();
    }, 1800); 
  } else {
    slotEls[i].classList.add('locked');
    numEls[i].textContent = digits[i];
    stopIdx++;
    setTimeout(() => {
      currentlyRevealing = false;
      stopNext();
    }, 500);
  }
}

/* ── EXECUTE ANIMATIONS ────────────────────────── */
function executeStopAnimation(i) {
  const digits = d5(result);

  clearInterval(ivals[i]);  
  numEls[i].textContent = digits[i];
  slotEls[i].className = 'slot locked';
  
  stopIdx++;
  
  let nextRequiresManual = (stopIdx >= 2);
  const delayTime = nextRequiresManual ? 100 : 800;
  
  setTimeout(() => {
    currentlyRevealing = false;
    stopNext();
  }, delayTime);
}

/* ── FINALISE ──────────────────────────────────── */
function finalise(){
  rolling=false;
  excluded.add(result);
  timerWrap.style.display='none';

  const currentPrize = PRIZES[prizeIndex];
  setStatus(`${currentPrize} 得主: ` + result,'win');

  const empty=histGrid.querySelector('.no-hist');
  if(empty)empty.remove();
  const b=document.createElement('div');
  b.className='badge';
  b.innerHTML = `<span class="pz">${currentPrize}</span>${result}`;
  histGrid.prepend(b);

  setTimeout(()=>{
    wbPrize.textContent = currentPrize;
    wbNum.textContent = result;
    winnerBanner.classList.add('show');
    
    spawnBurst(innerWidth/2, innerHeight/2);
    setTimeout(()=>spawnBurst(innerWidth*.3,innerHeight*.4),200);
    setTimeout(()=>spawnBurst(innerWidth*.7,innerHeight*.4),350);
  }, 300);
}

let isDismissing = false;
function dismissWinner(){
  if (isDismissing) return;
  isDismissing = true;
  
  winnerBanner.classList.remove('show');
  slotEls[4].classList.remove('ssr-reveal');
  slotEls[4].classList.add('locked');
  
  prizeIndex++;
  
  setTimeout(()=>{
    isDismissing = false;
    btnStart.classList.remove('btn-hidden');
    btnStart.classList.remove('btn-reveal');

    if (prizeIndex < PRIZES.length) {
      btnStart.disabled=false;
      btnStartText.textContent=`▶️ \u2009抽 ${PRIZES[prizeIndex]}`;
      setStatus('Awaiting · 等待抽獎');
    } else {
      btnStart.disabled=true;
      btnStartText.textContent='抽獎圓滿結束';
      setStatus('所有獎項已抽完 · All Prizes Drawn','win');
    }
    
    if(!pool().length && prizeIndex < PRIZES.length){
      setStatus('所有號碼已抽完 · All Done','win');
      btnStart.disabled=true;
    }
  }, 250);
}
</script>
</body>
</html>
